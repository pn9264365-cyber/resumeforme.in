<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResuGenius AI</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                        mono: ['Roboto Mono', 'monospace'],
                    },
                    colors: {
                        primary: '#2563eb',
                        secondary: '#475569',
                    }
                }
            }
        }
    </script>
    <style>
        /* Print Styles */
        @media print {
            @page {
                margin: 0;
                size: A4 portrait;
            }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            html, body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .no-print, header, .print\:hidden {
                display: none !important;
            }
            main {
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
            }
            /* Reset root container constraints */
            #root, #root > div {
                height: auto !important;
                display: block !important;
                overflow: visible !important;
            }
            /* Target the specific resume container */
            #resume-print-area {
                box-shadow: none !important;
                margin: 0 !important;
                width: 210mm !important;
                min-height: 297mm !important;
                transform: none !important;
                position: relative !important;
                background: white !important;
                display: block !important;
            }
            /* Ensure layout containers maintain their display properties in print */
            #resume-print-area > div {
                min-height: 297mm !important;
                background: white !important;
                width: 100% !important;
            }
            /* Force flex for ModernTemplate's root */
            #resume-print-area > .flex {
                display: flex !important;
            }
            /* Ensure grid layouts (MinimalTemplate) work */
            .grid {
                display: grid !important;
            }
        }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-100 text-gray-900 font-sans antialiased overflow-hidden print:overflow-visible">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
